name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install --include=dev

      - name: Build frontend (Vite)
        run: npm run build

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/timetable

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── Frontend ──────────────────────────────────────────────────────
            echo "Installing frontend dependencies..."
            npm install --include=dev

            echo "Building frontend..."
            npm run build

            echo "Copying frontend to web root..."
            sudo cp -r dist/* /var/www/life-planner/

            # ── Backend ───────────────────────────────────────────────────────
            echo "Installing server dependencies..."
            cd server
            npm install --include=dev

            # Compile TypeScript → CommonJS
            npx tsc

            # Start or restart the API process via PM2
            echo "Restarting API server..."
            pm2 restart life-planner-api \
              || pm2 start dist/index.js \
                   --name life-planner-api \
                   --env production \
                   --cwd /home/ubuntu/timetable/server

            pm2 save

            cd ..

            # ── Nginx ─────────────────────────────────────────────────────────
            echo "Reloading Nginx..."
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"
